database:
  path: data/auction_tracker.db

logging:
  level: INFO               # DEBUG, INFO, WARNING, ERROR
  file: data/auction_tracker.log   # Combined log (all scrapers together)
  log_dir: data/logs               # Per-scraper logs: data/logs/<website>.log + shared.log
  max_bytes: 10485760       # 10MB per file — rotated automatically
  backup_count: 5

display_timezone: Europe/Paris # IANA timezone for all displayed dates
display_currency: EUR          # ISO 4217 currency for displayed prices

display:
  chart_time_start: "2026-04-01"
  chart_price_min: 10
  chart_price_max: 5000

transport:
  default_request_delay: 2s # Minimum delay between requests to the same site
  default_timeout: 30s      # Navigation / HTTP timeout per request (all transports)
  max_retries: 3            # HTTP retries on failure (HTTP transport only)
  retry_backoff_factor: 2.0 # Multiplier between HTTP retries (1st 2s, 2nd 4s, 3rd 8s)
  browser_page_limit: 3     # Max concurrent Playwright browser tabs
  browser_headless: false   # false = visible window (better anti-bot), true = headless
  impersonation: chrome     # TLS fingerprint for curl_cffi (HTTP transport only)

classifier:
  enabled: true
  use_gpu: false            # Set true if a CUDA GPU is available
  threshold: 0.50           # Min CLIP score to keep a listing (0–1)
  images_directory: data/images
  max_images_per_listing: 3 # How many images to download per listing

scheduler:
  discovery_interval: 10m   # How often a search cycle runs per website
  daily_refresh_interval: 1d  # Re-fetch all active listings once a day
  phase_timeout: 10m        # Max time in the ending phase before giving up
  consecutive_failure_threshold: 5  # Failures before a listing is put on cooldown
  failure_cooldown: 5m      # Pause before retrying a listing after threshold failures
  late_watch_threshold: 5m  # Watch checks delayed beyond this appear in "Late watches"

  # eBay / fixed-end-time sites (snapshot strategy)
  snapshot:
    routine_interval: 6h
    approaching_threshold: 1h
    approaching_interval: 10m
    imminent_threshold: 5m
    imminent_interval: 60s
    ending_poll_interval: 2m
    ending_max_wait: 10m

  # Catawiki / extending auctions (full strategy)
  full:
    approaching_threshold: 1h
    approaching_interval: 5m
    imminent_threshold: 5m
    imminent_interval: 20s
    ending_poll_interval: 15s
    ending_max_wait: 10m

  # Drouot / results-after-sale (post_auction strategy)
  post_auction:
    delay_after_end: 15m
    recheck_interval: 1h
    max_wait: 3d
    max_recheck_count: 10

websites:
  ebay:
    enabled: true
    transport: http
    request_delay: 2s        # Min pause between two eBay requests
    monitoring_strategy: snapshot
    preferred_domain: ebay.fr
    http_warm_up: true       # Visit homepage first to get session cookies
  leboncoin:
    enabled: true
    transport: camoufox      # Camoufox (Firefox fork with C++ fingerprint masking)
    fallback_transport: browser  # rebrowser-playwright Chromium as fallback
    monitoring_strategy: snapshot
    request_delay: 4s        # Min pause between two LeBonCoin requests
  drouot:
    enabled: true
    transport: http
    fallback_transport: browser
    monitoring_strategy: post_auction
    request_delay: 2s
  catawiki:
    enabled: true
    transport: http
    fallback_transport: browser
    monitoring_strategy: full
    request_delay: 2s
    http_warm_up: true
  gazette_drouot:
    enabled: false
    transport: browser
    monitoring_strategy: post_auction
    historical_only: true
    exclude_from_discovery: true
  interencheres:
    enabled: true
    transport: http
    fallback_transport: browser
    monitoring_strategy: post_auction
    request_delay: 2s
  invaluable:
    enabled: false
    transport: http
    monitoring_strategy: post_auction
    request_delay: 2s
  liveauctioneers:
    enabled: true
    transport: http
    monitoring_strategy: post_auction
    request_delay: 2s
  yahoo_japan:
    enabled: true
    transport: http
    fallback_transport: browser
    monitoring_strategy: snapshot
    request_delay: 2s
  vinted:
    enabled: true
    transport: camoufox        # Navigate to HTML pages, parse __NEXT_DATA__
    fallback_transport: http   # HTTP fallback if Camoufox is unavailable
    monitoring_strategy: snapshot
    request_delay: 3s
    preferred_domain: vinted.fr
    http_warm_up: true
  todocoleccion:
    enabled: true
    transport: http
    fallback_transport: browser
    monitoring_strategy: snapshot
    request_delay: 3s
  kleinanzeigen:
    enabled: true
    transport: http
    fallback_transport: browser
    monitoring_strategy: snapshot
    request_delay: 3s
  ricardo:
    enabled: true
    transport: camoufox
    fallback_transport: browser
    monitoring_strategy: snapshot
    request_delay: 3s
  subito:
    enabled: true
    transport: camoufox
    fallback_transport: browser
    monitoring_strategy: snapshot
    request_delay: 3s
  marktplaats:
    enabled: true
    transport: http
    fallback_transport: browser
    monitoring_strategy: snapshot
    request_delay: 3s