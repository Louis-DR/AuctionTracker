{#
  Central color palette — edit this single file to change any color across the
  whole web UI. The CSS custom properties drive all badge and inline styles;
  window.PALETTE drives every Chart.js dataset and JS-rendered element.
#}
<style>
  :root {
    /* ---- Listing lifecycle status ---- */
    --color-active:    #0074d9;
    --color-sold:      #2ecc40;
    --color-unsold:    #ff4136;
    --color-upcoming:  #ffdc00;
    --color-cancelled: #aaa;
    --color-relisted:  #b10dc9;
    --color-unknown:   #ddd;

    /* ---- Sale type badges ---- */
    --color-type-auction: #7c3aed;
    --color-type-buy-now: #f59e0b;
    --color-type-hybrid:  #06b6d4;

    /* ---- Worker task types (loop bars) ---- */
    --color-task-search: #0074d9;
    --color-task-fetch:  #2ecc40;
    --color-task-watch:  #ff851b;
  }
</style>
<script>
/* Central color palette — referenced by every chart and badge. */
window.PALETTE = {
  /* Listing lifecycle status */
  status: {
    active:    '#0074d9',
    sold:      '#2ecc40',
    unsold:    '#ff4136',
    upcoming:  '#ffdc00',
    cancelled: '#aaa',
    relisted:  '#b10dc9',
    unknown:   '#ddd',
  },
  /* Sale type badges */

    auction: '#7c3aed',
    buy_now: '#f59e0b',
    hybrid:  '#06b6d4',
  },
  /* Semantic chart colors (not tied to listing status) */
  chart: {
    requests:     '#aaa',
    errors:       '#ff4136',
    error_rate:   '#ff851b',
    new_listings: '#7fdbff',
    fetch_queue:  '#ff851b',

    accepted:     '#2ecc40',
    rejected:     '#ff4136',
    total:        '#0074d9',
    auto_bid:     '#f59e0b',
    bid_line:     '#7c3aed',
    estimate:     '#0074d9',
    reserve:      '#ff4136',
    spending:     '#0074d9',
  },
  /* Worker task type colors */
  task: {
    search: '#0074d9',
    fetch:  '#2ecc40',
    watch:  '#ff851b',

  /* Website / brand colors — keys match lowercase DB names */

    ricardo:        '#ef7310',

};
